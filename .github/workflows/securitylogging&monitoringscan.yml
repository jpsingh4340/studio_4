name: OWASP Security Logging and Monitoring Failures Scan
 
on:

  push:

    branches: [ "main" ]

  pull_request:
 
jobs:

  logging-monitoring-scan:

    runs-on: ubuntu-latest
 
    steps:

      # 1. Checkout repository

      - name: Checkout Repository

        uses: actions/checkout@v4
 
      # 2. Setup Node.js

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: "18"
 
      # 3. Install dependencies

      - name: Install Dependencies

        run: npm install
 
      # 4. Build application

      - name: Build App

        run: npm run build

        env:

          CI: false
 
      # 5. Start app locally

      - name: Start App

        run: |

          npm install -g serve

          serve -s build -l 3000 &

          sleep 10
 
      # 6. Prepare ZAP report folder

      - name: Prepare ZAP Report Folder

        run: |

          mkdir -p zap-reports

          chmod -R 777 zap-reports
 
      # 7. Run ZAP scan

      - name: Run ZAP Scan (Security Logging & Monitoring)

        run: |

          docker pull ghcr.io/zaproxy/zaproxy:stable

          docker run --rm \

            --network=host \

            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \

            ghcr.io/zaproxy/zaproxy:stable \

            zap-full-scan.py \

            -t http://localhost:3000 \

            -J report_json.json \

            -w report_md.md \

            -r report_html.html \

            -a \

            -z "-config scanner.attackStrength=HIGH -config scanner.alertThreshold=LOW" || true
 
      # 8. Upload reports

      - name: Upload ZAP Reports

        uses: actions/upload-artifact@v4

        with:

          name: security_logging_monitoring_reports

          path: |

            zap-reports/report_html.html

            zap-reports/report_md.md

            zap-reports/report_json.json
 