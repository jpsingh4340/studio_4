name: OWASP Insecure Design Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  insecure-design-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node (for React app)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Build your app
      - name: Build App
        run: npm run build
        env:
          CI: false

      # 5. Start app locally
      - name: Start App
        run: |
          npm install -g serve
          serve -s build -l 3000 &
          sleep 10

      # 6. Create folder for ZAP reports
      - name: Prepare ZAP Report Folder
        run: |
          mkdir -p zap-reports
          chmod -R 777 zap-reports

      # 7. Run ZAP Full Scan (Insecure Design focus)
      - name: Run ZAP Scan (Insecure Design)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:3000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            -a \
            -z "-config scanner.attackStrength=HIGH -config scanner.alertThreshold=LOW" || true

      # 8. Upload reports to GitHub Actions
      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: insecure_design_reports
          path: |
            zap-reports/report_html.html
            zap-reports/report_md.md
            zap-reports/report_json.json