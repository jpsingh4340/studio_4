name: OWASP XML Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'   # daily scan

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run tests (your original CI step)
    - name: Run tests
      run: npm test

    # 5. Build app (for scanning)
    - name: Build app
      run: npm run build

    # 6. Start app locally
    - name: Start app
      run: |
        npm install -g serve
        serve -s build -l 3000 &
        sleep 5

    # 7. Run OWASP ZAP Scan (XML report)
    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:3000'
        cmd_options: '-a -x zap-report.xml'
        fail_action: false

    # 8. Upload XML report
    - name: Upload ZAP XML Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-xml-report
        path: zap-report.xml