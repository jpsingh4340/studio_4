name: OWASP Broken Access Control Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  bac-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build
        env:
          CI: false

      - name: Start app
        run: |
          npm install -g serve
          serve -s build -l 3000 &
          sleep 10

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:3000'
          cmd_options: '-a -z "-config scanner.attackStrength=HIGH -config scanner.alertThreshold=LOW"'
          fail_action: false
          artifact_name: broken-access-control-scan

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        with:
          name: broken-access-control-reports
          path: |
            report_html.html
            report_md.md
            report_json.json