name: ZAP Security Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare workspace permissions
        run: |
          mkdir -p zap-reports
          chmod -R 777 zap-reports

      - name: Run ZAP Baseline Scan with Docker
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t https://rentmate-c7360.web.app/ \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html || true

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        with:
          name: zap_reports
          path: |
            zap-reports/report_html.html
            zap-reports/report_md.md
            zap-reports/report_json.json
